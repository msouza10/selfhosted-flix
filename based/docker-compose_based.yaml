
services:
  jellyfin:
    image: linuxserver/jellyfin
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - jellyfin_config:/config
      - /opt/radarr-media:/media-radarr
      - /opt/sonarr-media:/media-sonarr
    expose:
      - "8096"
    labels:
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.lan`)"
      - "traefik.http.routers.jellyfin.entrypoints=web"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    restart: unless-stopped
    networks:
      - media
    depends_on:
      - radarr
      - sonarr
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - qbittorrent_config:/config
      - /opt/radarr-media:/downloads-radarr
      - /opt/sonarr-media:/downloads-sonarr
    expose:
      - "8080"
    labels:
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.lan`)"
      - "traefik.http.routers.qbittorrent.entrypoints=web"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
    restart: unless-stopped
    networks:
      - media
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - radarr_config:/config
      - /opt/radarr-media:/media-radarr
    expose:
      - "7878"
    labels:
      - "traefik.http.routers.radarr.rule=Host(`radarr.lan`)"
      - "traefik.http.routers.radarr.entrypoints=web"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    restart: unless-stopped
    networks:
      - media
    depends_on:
      - qbittorrent
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - sonarr_config:/config
      - /opt/sonarr-media:/media-sonarr
    expose:
      - "8989"
    labels:
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.lan`)"
      - "traefik.http.routers.sonarr.entrypoints=web"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    restart: unless-stopped
    networks:
      - media
    depends_on:
      - qbittorrent
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  heimdall:
    image: linuxserver/heimdall
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - heimdall_config:/config
    expose:
      - "80"
    labels:
      - "traefik.http.routers.heimdall.rule=Host(`heimdall.lan`)"
      - "traefik.http.routers.heimdall.entrypoints=web"
      - "traefik.http.services.heimdall.loadbalancer.server.port=80"
    restart: unless-stopped
    networks:
      - media
    depends_on:
      - qbittorrent
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prowlarr:
    image: linuxserver/prowlarr
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - prowlarr_config:/config
    expose:
      - "9696"
    labels:
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.lan`)"
      - "traefik.http.routers.prowlarr.entrypoints=web"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    restart: unless-stopped
    networks:
      - media
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  traefik:
    image: traefik:v3.4
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--api.dashboard=true"
      - "--api.debug=true"
      - "--entrypoints.web.address=:80"
    # - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
    #      - "443:443"
    labels:
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.lan`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=msouza:$2y$05$5Daq/2yzz.Q1mQJw76FCEudraC7/Ppx9pCdt4Y4w9u904qhp2krkW" # senha 1234
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - media
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  whoami:
    image: traefik/whoami
    container_name: whoami-traefik
    restart: unless-stopped
    labels:
      - "traefik.http.routers.whoami.rule=Host(`whoami.lan`)"
      - "traefik.http.routers.whoami.entrypoints=web"
    networks:
      - media

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=America/Sao_Paulo
      - WATCHTOWER_POLL_INTERVAL=21600
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
    command: --debug
    restart: unless-stopped
    networks:
      - media

volumes:
  jellyfin_config:
  radarr_config:
  sonarr_config:
  prowlarr_config:
  qbittorrent_config:
  heimdall_config:

networks:
  media:
    driver: bridge